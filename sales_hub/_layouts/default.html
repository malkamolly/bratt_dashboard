<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% if page.title %}{{ page.title }} &middot; {% endif %}{{ site.title }}</title>
  {% seo title=false %}
  <link rel="stylesheet" href="{{ '/assets/css/tokens.css' | relative_url }}" />
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}" />
  <link rel="icon" type="image/png" href="{{ '/assets/img/brand/mascot-circle-color.png' | relative_url }}" />
</head>
<body>
  <header class="site">
    <div class="inner">
      <a href="{{ '/' | relative_url }}" class="brand">
        <img class="logo" src="{{ '/assets/img/logotype-color.png' | relative_url }}" alt="Bratt Tree">
        <span class="sub">Sales Arborist Hub</span>
      </a>
      <nav>
        <a href="{{ '/' | relative_url }}">Home</a>
        <a href="{{ '/arborists/' | relative_url }}">Roster</a>
        <a href="{{ '/meetings/' | relative_url }}">Meetings</a>
        <a href="{{ '/library/' | relative_url }}">Library</a>
        <a href="{{ '/onboarding/' | relative_url }}">Onboarding</a>
      </nav>
    </div>
  </header>

  <main class="site-main">
    {{ content }}
  </main>

  <footer class="site-footer">
    <img class="site-footer__watermark" src="{{ '/assets/img/brand/mascot-color.png' | relative_url }}" alt="" aria-hidden="true" />
    <div class="site-footer__inner">
      <p>&copy; {{ site.time | date: '%Y' }} Bratt Tree Company &middot; Family-owned since 1991</p>
      <p>Sales Arborist Hub &middot; Internal use</p>
    </div>
  </footer>
</body>
</html>
